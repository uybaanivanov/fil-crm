server {
    server_name daily-rental-crm.itartyom.space;

    client_max_body_size 20m;

    # SvelteKit demo build (npm run build:demo)
    root /opt/fil-crm-demo/frontend/build;
    index index.html;

    # Backend API demo — порт 8001
    location /api/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Demo media (обложки квартир, обезличенные)
    location /media/ {
        alias /opt/fil-crm-demo/backend/media/;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    # Cert выпускается через certbot для daily-rental-crm.itartyom.space:
    # ssl_certificate /etc/letsencrypt/live/daily-rental-crm.itartyom.space/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/daily-rental-crm.itartyom.space/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = daily-rental-crm.itartyom.space) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name daily-rental-crm.itartyom.space;
    return 404;
}
