server {
    server_name sakha.gay;

    client_max_body_size 20m;

    # Собранный SvelteKit (adapter-static) — фронт раздаётся как статика
    root /opt/fil-crm/frontend/build;
    index index.html;

    # Backend API — trailing slash на proxy_pass стрипает префикс /api
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Загруженные обложки квартир (см. backend/media/)
    location /media/ {
        alias /opt/fil-crm/backend/media/;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # Иммутабельные ассеты SvelteKit
    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — всё остальное отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/sakha.gay/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sakha.gay/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = sakha.gay) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name sakha.gay;
    return 404;
}
